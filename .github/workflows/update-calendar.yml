name: Update Dota 2 calendar

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dota2-calendar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --locked

      - name: Run tests
        run: uv run python -m unittest discover -s tests -v

      - name: Generate calendar
        env:
          LIQUIPEDIA_USER_AGENT: LiquipediaIcal/1.0 (https://github.com/${{ github.repository }})
        run: uv run liquipedia-ical --output dota2-matches.ics

      - name: Commit an updated calendar
        run: |
          if git diff --quiet -- dota2-matches.ics; then
            echo "No calendar changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dota2-matches.ics
          git commit -m "Update Dota 2 match calendar"
          git push

